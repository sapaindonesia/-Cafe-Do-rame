<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Cafe Do'rame</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">☕ Cafe Do'rame</div>
            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">Tentang</a></li>
                <li><a href="cart.html">Keranjang <span id="cart-count">(0)</span></a></li>
                <li><a href="contact.html">Kontak</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <section style="padding: 120px 0 5rem 0;">
        <div class="container">
            <h2 class="section-title">Hubungi Kami</h2>
            <div class="grid">
                <div>
                    <div class="card">
                        <h3><i class="fas fa-map-marker-alt" style="color:#D2691E;"></i> Alamat</h3>
                        <p>Jalan Raya Jombang No.123<br>Kec. Kabuh, Jombang, Jawa Timur</p>
                    </div>
                    <div class="card">
                        <h3><i class="fas fa-clock" style="color:#D2691E;"></i> Jam Buka</h3>
                        <p>07:00 - 23:00 (Setiap Hari)</p>
                    </div>
                    <div class="card">
                        <h3><i class="fas fa-phone" style="color:#D2691E;"></i> Telepon</h3>
                        <p><a href="tel:+6281234567890">+62 812-3456-7890</a></p>
                    </div>
                </div>
                <div>
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1787.6306746587586!2d112.23265116524212!3d-7.5475444478807585!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sid!2sid!4v1774456947485!5m2!1sid!2sid" 
                       width="100%" height="400" style="border:0; border-radius:15px;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
            </div>

            <h3 style="text-align:center; margin:3rem 0 2rem 0; color:#D2691E;">Kirim Pesan</h3>
            <form id="contact-form">
                <div class="form-group">
                    <label>Nama</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>Email / WA</label>
                    <input type="tel" required>
                </div>
                <div class="form-group">
                    <label>Pesan</label>
                    <textarea rows="5" required></textarea>
                </div>
                <button type="submit" class="cta-button" style="width:100%;">Kirim Pesan</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="social-links">
                <a href="#"><i class="fab fa-whatsapp"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-facebook"></i></a>
            </div>
            <p>&copy; 2026 Cafe Do'rame. Semua hak dilindungi.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            validateForm('contact-form');
        });
    </script>
</body>
</html>
