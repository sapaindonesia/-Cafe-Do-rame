<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Cafe Do'rame</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">☕ Cafe Do'rame</div>
            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">Tentang</a></li>
                <li><a href="cart.html">Keranjang <span id="cart-count">(0)</span></a></li>
                <li><a href="contact.html">Kontak</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <section style="padding: 120px 0 5rem 0;">
        <div class="container">
            <h2 class="section-title">Checkout</h2>
            <div id="cart-items"></div>
            <div style="text-align:right;">
                <div class="total" id="cart-total">Total: Rp0</div>
            </div>
            <form id="checkout-form" style="max-width:600px; margin:2rem auto 0;">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="customer-name" required>
                </div>
                <div class="form-group">
                    <label>Alamat Lengkap</label>
                    <textarea id="address" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Metode Pembayaran</label>
                    <select id="payment" required>
                        <option value="">Pilih...</option>
                        <option value="COD">Bayar di Tempat (COD)</option>
                        <option value="Transfer">Transfer Bank</option>
                    </select>
                </div>
                <button type="submit" class="cta-button" style="width:100%;">Kirim Pesanan via WhatsApp</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="social-links">
                <a href="#"><i class="fab fa-whatsapp"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-facebook"></i></a>
            </div>
            <p>&copy; 2024 Cafe Do'rame. Semua hak dilindungi.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateCartDisplay();
            document.getElementById('checkout-form').addEventListener('submit', (e) => {
                e.preventDefault();
                processOrder();
            });
        });
    </script>
</body>
</html>
